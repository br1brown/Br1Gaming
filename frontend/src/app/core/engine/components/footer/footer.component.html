<footer class="container-fluid mt-3 theme-bg site-footer small">
    <div class="container py-4">
        <app-loading [loading]="profileLoading()">
            <app-profile-render [profile]="profile()" />
        </app-loading>

        <app-footer-nav [links]="footerNavLinks" />

        @if (socialLinks().length > 0) {
        <div class="row mb-3 text-center">
            <div class="col">
                @for (link of socialLinks(); track link.type) {
                <span class="mx-2">
                    <app-social-link [type]="link.type" [value]="link.value" [showLabel]="true" />
                </span>
                }
            </div>
        </div>
        <hr />
        }

        <div class="row pt-3">
            <div class="col text-center">
                <p class="small mb-1">
                    &copy; {{ currentYear }} <strong>{{ appName }}</strong> |
                    {{ 'dirittiRiservatiAzienda' | translate }}
                </p>
                @if (description()) {
                <p class="small italic">{{ description() }}</p>
                }
            </div>
        </div>

    </div>
</footer>
