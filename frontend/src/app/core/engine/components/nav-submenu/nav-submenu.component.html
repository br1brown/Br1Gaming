<div class="dropdown-submenu"
     [class.expanded]="expanded()"
     [class.flip-left]="flipLeft()"
     [class.active]="isActive()"
     (mouseenter)="updateFlip()"
     (focusin)="updateFlip()">
    <button type="button"
            class="dropdown-item submenu-toggle"
            aria-haspopup="true"
            [attr.aria-expanded]="expanded()"
            [attr.aria-current]="isActive() ? 'location' : null"
            (click)="toggle()">
        <span>{{ item().label | translate }}</span>
        <span class="nav-dropdown-caret submenu-caret" aria-hidden="true"></span>
    </button>
    <ul class="dropdown-menu submenu-panel list-unstyled">
        @for (child of item().children; track child.path) {
            <li>
                @if (isGroup(child)) {
                    <app-nav-submenu [item]="child" (linkClick)="onLinkClick()" />
                } @else {
                    <app-nav-link [link]="child"
                                  cssClass="dropdown-item"
                                  activeCssClass="dropdown-item nav-current-link active"
                                  (linkClick)="onLinkClick()" />
                }
            </li>
        }
    </ul>
</div>
