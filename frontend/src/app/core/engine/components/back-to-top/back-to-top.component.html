@if (isVisible()) {
  <button type="button"
          class="back-to-top surface-elevated fab rounded-circle d-flex align-items-center justify-content-center fs-5"
          (click)="scrollToTop()"
          [attr.aria-label]="'tornaInCimaNav' | translate">
    <i class="fas fa-chevron-up" aria-hidden="true"></i>
  </button>
}
