<div class="variant-picker d-flex flex-wrap gap-2"
     role="radiogroup"
     [attr.aria-label]="ariaLabel()">
    @for (opt of options(); track opt.key) {
    <button type="button"
            [class.active]="active() === opt.key"
            role="radio"
            [attr.aria-checked]="active() === opt.key"
            [disabled]="loading()"
            (click)="onPick()(opt.key)">{{ opt.label }}</button>
    }
</div>
