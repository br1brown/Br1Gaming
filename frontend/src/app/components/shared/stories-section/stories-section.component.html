<h2 class="h4 fw-bold mb-3">{{ 'storie' | translate }}</h2>

@if (loading()) {
<!-- Scheletro durante il caricamento. -->
<div class="row g-3 placeholder-glow" aria-hidden="true">
    @for (n of skeletonSlots; track n) {
    <div [class]="itemColClass()">
        <div class="card" style="min-height: 96px">
            <div class="card-body">
                <span class="placeholder col-7 mb-2 d-block"></span>
                <span class="placeholder col-10 d-block"></span>
            </div>
        </div>
    </div>
    }
</div>
} @else {
<app-card-grid [items]="cards()" [itemColClass]="itemColClass()" />
}
