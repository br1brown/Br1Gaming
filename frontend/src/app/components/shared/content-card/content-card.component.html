<!-- Riga di lista (non più card verticale): miniatura a sinistra, testo al centro, chevron.
     Tutta la riga è il link → niente bottone "Vai" separato. Su mobile occupa l'intera
     larghezza (vedi griglia col-12 in home), così il testo non resta compresso. -->
<a class="card content-card-row flex-row overflow-hidden h-100 text-reset text-decoration-none"
   [routerLink]="path()">
    @if (imageId() && imageVisible()) {
    <img [appAsset]="imageId()!"
         [appAssetWidth]="320"
         [alt]="title()"
         class="content-card-thumb object-fit-cover flex-shrink-0"
         loading="lazy"
         (error)="onImageError()">
    }
    <div class="card-body d-flex align-items-center gap-3 py-3">
        <div class="flex-grow-1 content-card-text">
            <h3 class="card-title h6 mb-1">{{ title() }}</h3>
            @if (subtitle()) {
            <p class="card-text text-muted small mb-0">{{ subtitle() }}</p>
            }
        </div>
        <i class="fa-solid fa-chevron-right text-secondary flex-shrink-0" aria-hidden="true"></i>
    </div>
</a>
