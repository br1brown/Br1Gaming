<div class="card h-100">
    @if (imageId() && imageVisible()) {
    <img [appAsset]="imageId()!" [appAssetWidth]="512" [alt]="title()" class="card-img-top content-card-image" loading="lazy"
         (error)="onImageError()">
    }
    <div class="card-body d-flex flex-column">
        <h3 class="card-title h6">{{ title() }}</h3>
        @if (subtitle()) {
        <p class="card-text text-muted small flex-grow-1">{{ subtitle() }}</p>
        }
        <a class="btn btn-primary btn-sm mt-auto align-self-start" [routerLink]="path()">
            Vai <i class="fa-solid fa-arrow-right ms-1" aria-hidden="true"></i>
        </a>
    </div>
</div>
