<div class="radar-screen" appFitViewport>

    <div #mapContainer class="radar-map"></div>
    <div class="radar-scanlines"></div>

    @switch (status()) {

        @case ('ready') {
            <div class="radar-controls">
                <button type="button" class="radar-ctrl" (click)="recenter()"
                        [title]="'radarRecenter' | translate" [attr.aria-label]="'radarRecenter' | translate">
                    <i class="fa-solid fa-location-crosshairs" aria-hidden="true"></i>
                </button>
            </div>
        }

        @case ('error') {
            <div class="radar-overlay">
                <div class="scouter-panel error">
                    <p class="scouter-title">{{ 'radarOffline' | translate }}</p>
                    <p>{{ errorMsg() | translate }}</p>
                    <a routerLink="/" class="scouter-btn">{{ 'radarBack' | translate }}</a>
                </div>
            </div>
        }

        @default {
            <div class="radar-overlay">
                <div class="scouter-panel">
                    <div class="scouter-spinner"></div>
                    <p>{{ (status() === 'searching' ? 'radarSearching' : 'radarLocating') | translate }}</p>
                </div>
            </div>
        }
    }

</div>
