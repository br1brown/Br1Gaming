<div class="d-flex flex-column overflow-hidden user-select-none flex-grow-1">

    <header class="flex-shrink-0 text-center py-2 px-3">
        <h1 class="h4 fw-bold mb-0">{{ 'radar' | translate }}</h1>
    </header>

    <div class="position-relative flex-grow-1 overflow-hidden">

        <div #mapContainer class="position-absolute top-0 start-0 w-100 h-100"></div>

        @switch (status()) {

            @case ('ready') {
                <div class="position-absolute top-0 end-0 m-2 d-flex flex-column gap-2">
                    <button type="button" class="btn btn-light rounded-circle shadow-sm" (click)="recenter()"
                            [title]="'radarRecenter' | translate" [attr.aria-label]="'radarRecenter' | translate">
                        <i class="fa-solid fa-location-crosshairs" aria-hidden="true"></i>
                    </button>
                </div>
            }

            @case ('error') {
                <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center p-4 bg-dark bg-opacity-75">
                    <div class="card text-center p-4">
                        <p class="h5 fw-bold text-danger mb-2">{{ 'radarOffline' | translate }}</p>
                        <p class="mb-3">{{ errorMsg() | translate }}</p>
                        <a routerLink="/" class="btn btn-outline-secondary">{{ 'radarBack' | translate }}</a>
                    </div>
                </div>
            }

            @default {
                <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center p-4 bg-dark bg-opacity-75">
                    <div class="card text-center p-4">
                        <div class="spinner-border mb-3" role="status"></div>
                        <p class="mb-0">{{ (status() === 'searching' ? 'radarSearching' : 'radarLocating') | translate }}</p>
                    </div>
                </div>
            }
        }

    </div>

</div>
