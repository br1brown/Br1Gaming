<main class="col-12 col-md-10 offset-md-1 col-lg-10 offset-lg-1">

    <!-- Hero -->
    <section class="text-center py-5 px-3 mb-5 bg-body-tertiary rounded-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h1 class="display-5 fw-bold mb-2">{{ appName }}</h1>
                <p class="lead text-secondary mb-0">{{ 'homeTagline' | translate }}</p>
            </div>
        </div>
    </section>

    <!-- Generatori (sopra la piega: idratato subito). La sezione si carica da sé l'elenco. -->
    <section class="mb-5">
        <app-generators-section />
    </section>

    <!-- Storie e Giochi affiancati: metà colonne ciascuno → una riga unica da desktop, impilati su mobile.
         Ogni colonna resta un @defer indipendente (idratazione incrementale on viewport). Le sezioni
         usano itemColClass="col-12" per impilare le card in colonna singola nella mezza larghezza. -->
    <div class="row g-4">

        <!-- Storie -->
        <div class="col-12 col-md-6">
            @defer (hydrate on viewport) {
            <section class="mb-5 mb-md-0">
                <app-stories-section itemColClass="col-12" />
            </section>
            } @placeholder {
            <section class="mb-5 mb-md-0" aria-hidden="true">
                <span class="placeholder col-3 col-md-4 d-block mb-3" style="height: 1.75rem"></span>
                <div class="row g-3 placeholder-glow">
                    @for (n of skeletonSlots; track n) {
                    <div class="col-12">
                        <div class="card" style="min-height: 96px">
                            <div class="card-body">
                                <span class="placeholder col-7 mb-2 d-block"></span>
                                <span class="placeholder col-10 d-block"></span>
                            </div>
                        </div>
                    </div>
                    }
                </div>
            </section>
            }
        </div>

        <!-- Giochi -->
        <div class="col-12 col-md-6">
            @defer (hydrate on viewport) {
            <section class="mb-5 mb-md-0">
                <app-games-section itemColClass="col-12" />
            </section>
            } @placeholder {
            <section class="mb-5 mb-md-0" aria-hidden="true">
                <span class="placeholder col-3 col-md-4 d-block mb-3" style="height: 1.75rem"></span>
                <div class="row g-3 placeholder-glow">
                    @for (n of skeletonSlots; track n) {
                    <div class="col-12">
                        <div class="card" style="min-height: 96px">
                            <div class="card-body">
                                <span class="placeholder col-7 mb-2 d-block"></span>
                                <span class="placeholder col-10 d-block"></span>
                            </div>
                        </div>
                    </div>
                    }
                </div>
            </section>
            }
        </div>

    </div>
</main>
