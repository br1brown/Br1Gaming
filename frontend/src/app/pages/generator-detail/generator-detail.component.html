<div class="col-12 col-md-8 offset-md-2 py-3">

    @if (generator(); as gen) {
    <div class="d-flex align-items-center gap-3 mb-4">
        @if (coverAssetId() && coverVisible()) {
        <!-- La cover deve essere alta quanto il blocco testo, non viceversa: l'img è
             position-absolute così la sua altezza intrinseca NON entra nel calcolo
             della riga flex (in-flow creerebbe circolarità e vincerebbe l'immagine).
             Il wrapper stretchato le dà il box: alto come il testo, largo 25%;
             object-fit-contain mantiene le proporzioni dentro quel box. -->
        <div class="align-self-stretch position-relative flex-shrink-0 w-25">
            <img [appAsset]="coverAssetId()!"
                 [appAssetWidth]="320"
                 alt=""
                 class="position-absolute top-0 start-0 w-100 h-100 object-fit-contain rounded-5"
                 (error)="coverVisible.set(false)">
        </div>
        }
        <div>
            <h1 class="h3 fw-bold mb-1">{{ gen.name }}</h1>
            <p class="text-secondary mb-0">{{ gen.description }}</p>
        </div>
    </div>

    <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
        <button class="btn btn-primary rounded-pill px-4" (click)="generate()" [disabled]="loading()">
            @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            }
            {{ 'genera' | translate }}!
        </button>

        @if (result()) {
        <div class="row">
                <app-speech-action [action]="speakText" class="col" />
                <app-copy-action [action]="copyText" class="col" [showLabel]="true" />
                <app-share-action [action]="buildShareCanvas" class="col" [showLabel]="true"
                                  [title]="shareTitle()" [filename]="shareFilename()" />
        </div>
        }
    </div>

    @if (result(); as res) {
    <div class="p-4 shadow-sm">
        <div [innerHTML]="res.markdown | markdown"></div>
    </div>
    }

    } @else {
    <div class="d-flex justify-content-center align-items-center py-5">
        <div class="spinner-grow text-secondary opacity-50" role="status"></div>
    </div>
    }
</div>
