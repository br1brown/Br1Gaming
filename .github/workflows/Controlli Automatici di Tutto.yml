name: Controlli Automatici di Tutto

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Annulla i run superati sullo stesso ref (es. push rapidi o push+PR dello stesso
# branch): evita doppioni e libera i runner.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Compila backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configura .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Compila
        # Niente -warnaserror: questa CI è ereditata tale e quale dai figli, e i warning del
        # loro dominio (XML-doc mancanti, nullability) non devono bloccargli la build.
        # Lo zero-warning resta la disciplina del template, non un gate per i figli.
        run: dotnet build backend/backend.csproj --configuration Release

      - name: Controlla pacchetti vulnerabili
        run: |
          OUTPUT=$(dotnet list backend/backend.csproj package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          # Gate ereditato tale e quale dai figli: blocca solo sul davvero urgente
          # (severità Critical). High/Moderate/Low restano visibili nell'output qui sopra
          # ma non bloccano, per non imporre a parente e figli di rincorrere ogni advisory.
          if echo "$OUTPUT" | grep -qw "Critical"; then
            echo "::error::Trovati pacchetti NuGet con vulnerabilità CRITICAL. Esegui 'dotnet list package --vulnerable' per i dettagli."
            exit 1
          fi

  frontend:
    name: Compila frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installa dipendenze
        working-directory: frontend
        run: npm ci

      - name: Audit di sicurezza
        working-directory: frontend
        # Gate ereditato tale e quale dai figli: blocca solo su vulnerabilità "critical".
        # npm stampa comunque l'intero report (anche high/moderate), ma esce non-zero solo
        # sul critical, per non imporre a parente e figli di rincorrere ogni advisory di framework.
        run: npm audit --audit-level=critical --omit=dev

      - name: Analisi Lint
        run: bash scripts/test/lint-check.sh

      - name: Controllo dei tipi
        run: bash scripts/test/tsc-check.sh

      - name: Dipendenze circolari
        run: bash scripts/test/circular-deps-check.sh

      - name: Genera risorse statiche
        working-directory: frontend
        run: npm run generate:statics

      - name: Verifica seed allineato a global-settings.json
        # environment.ts è un seed generato MA versionato (vedi generate-statics.ts): è funzione
        # pura di global-settings.json (project / Localization / site), senza URL né date, quindi
        # deterministico ovunque. Se dopo la rigenerazione differisce dal committato, qualcuno l'ha
        # editato a mano o ha scordato di rigenerare dopo un cambio di config. Versione e identità
        # si toccano SOLO in global-settings.json, mai nel file generato.
        run: |
          if ! git diff --quiet -- frontend/src/environments/environment.ts; then
            echo "::error file=frontend/src/environments/environment.ts::Seed non allineato a global-settings.json: cambia versione/identità lì, poi 'npm run generate:statics' (cartella frontend) e committa il risultato."
            git --no-pager diff -- frontend/src/environments/environment.ts
            exit 1
          fi

      - name: Genera icone
        working-directory: frontend
        run: npm run generate:icons

      - name: Genera tipi da global-settings.schema.json
        working-directory: frontend
        run: npm run generate:types

      - name: Verifica tipi allineati a global-settings.schema.json
        # global-settings.types.ts è generato da json2ts a partire dallo schema MA versionato: è
        # funzione pura di global-settings.schema.json. Se dopo la rigenerazione differisce dal
        # committato, qualcuno ha toccato lo schema senza rigenerare i tipi (o li ha editati a mano).
        # Stesso gate del seed environment.ts, applicato all'altro file generato-e-versionato.
        run: |
          if ! git diff --quiet -- frontend/src/app/core/engine/global-settings.types.ts; then
            echo "::error file=frontend/src/app/core/engine/global-settings.types.ts::Tipi non allineati allo schema: cambia global-settings.schema.json, poi 'npm run generate:types' (cartella frontend) e committa il risultato."
            git --no-pager diff -- frontend/src/app/core/engine/global-settings.types.ts
            exit 1
          fi

      - name: Compila frontend
        working-directory: frontend
        run: npx ng build --configuration production

  i18n:
    name: Completezza i18n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Controlla simmetria chiavi di tutte le lingue
        run: bash scripts/test/i18n-check.sh

  security-scan:
    name: Sicurezza (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Secret scanning: intercetta segreti committati per sbaglio (rinforza l'architettura
      # "segreti fuori da git"). Via immagine Docker: nessuna licenza/token, portabile su ogni
      # fork. L'allowlist dei segnaposto del template è in .gitleaks.toml.
      - name: Secret scanning (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-git --redact --verbose --config=/repo/.gitleaks.toml

  live-tests:
    name: Test live
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installa dipendenze
        working-directory: frontend
        run: npm ci

      - name: Avvia stack
        run: bash scripts/test/public-test.sh

      - name: Audit di accessibilità
        run: bash scripts/test/a11y-test.sh http://localhost:8088

      - name: Audit Lighthouse
        run: bash scripts/test/lighthouse-test.sh http://localhost:8088

      - name: Butta giù
        if: always()
        run: |
          # Stesso project name che public-test.sh deriva da global-settings.json (slug di
          # project.name): derivato e non hardcoded, così il teardown resta corretto anche
          # nei progetti figli che rinominano il progetto.
          COMPOSE_PROJECT_NAME="$(node --input-type=module --eval "import{readFileSync}from'fs';const s=JSON.parse(readFileSync('global-settings.json','utf-8'));process.stdout.write(String(s.project?.name||'app').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+\$/g,''))")" \
          docker compose -f docker-compose.yml -f docker-compose.public-test.yml down
