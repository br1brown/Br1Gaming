name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Build backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build
        run: dotnet build backend/backend.csproj --configuration Release

  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate Statics
        working-directory: frontend
        run: npm run generate:statics

      - name: Generate Icons
        working-directory: frontend
        run: npm run generate:icons

      - name: Build frontend
        working-directory: frontend
        run: npx ng build --configuration production

  smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          echo "COMPOSE_PROJECT_NAME=ci_test" > .env.param
          echo "FRONTEND_PORT=3000" >> .env.param

      - name: Run Smoke Test
        run: ./deploy.sh --test-public --down-after
